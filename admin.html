<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Knowledge Base Manager</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 500px; margin: 40px auto; padding: 20px; color: #333; }
        .upload-box { border: 2px dashed #007bff; padding: 40px 20px; text-align: center; border-radius: 8px; background: #f8f9fa; }
        input[type="file"] { margin-bottom: 20px; }
        button { background: #007bff; color: white; border: none; padding: 12px 24px; cursor: pointer; border-radius: 6px; font-weight: bold; width: 100%; }
        button:hover { background: #0056b3; }
        #status { margin-top: 20px; padding: 10px; border-radius: 4px; text-align: center; font-weight: 500; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h2>Knowledge Base Manager</h2>
    <p>Upload text documentation to update your chatbot's memory.</p>
    <div class="upload-box">
        <input type="file" id="fileInput" accept=".txt">
        <button onclick="uploadDoc()">Upload to Chatbot</button>
    </div>
    <div id="status" style="display: none;"></div>

    <script>
        // Replace with your live deployed backend URL (e.g., https://your-app.render.com)
        const BACKEND_URL = 'http://localhost:5000'; 

        async function uploadDoc() {
            const fileInput = document.getElementById('fileInput');
            const statusDiv = document.getElementById('status');
            if (!fileInput.files[0]) return alert('Please select a .txt file first.');

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            statusDiv.style.display = 'block';
            statusDiv.className = '';
            statusDiv.innerText = "Uploading document...";

            try {
                const res = await fetch(`${BACKEND_URL}/upload`, { method: 'POST', body: formData });
                const data = await res.json();
                if (res.ok) {
                    statusDiv.className = 'success';
                    statusDiv.innerText = data.message;
                } else {
                    statusDiv.className = 'error';
                    statusDiv.innerText = data.error || 'Upload failed.';
                }
            } catch (err) {
                statusDiv.className = 'error';
                statusDiv.innerText = "Connection error. Ensure backend is running.";
            }
        }
    </script>
</body>
</html>
